<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product Form</title>

<style>
body{
    font-family: Arial, sans-serif;
    margin:40px;
}

form{
    width:900px;
}

fieldset{
    margin-bottom:10px;
    padding:15px;
}

table{
    width:100%;
}

td{
    padding:8px;
    vertical-align:top;
}

.label{
    width:180px;
}

input[type="text"],
input[type="number"],
input[type="email"],
select{
    width:250px;
    padding:5px;
}

textarea{
    width:100%;
    height:120px;
    resize:vertical;
}

.submit{
    text-align:right;
    margin-top:20px;
}

button{
    background:blue;
    color:white;
    border:none;
    padding:10px 20px;
    font-size:16px;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:darkblue;
}
</style>

</head>
<body>

<form action="https://teach-backend-fawn.vercel.app/api/product"
      method="POST"
      enctype="multipart/form-data">

    <fieldset>
        <legend>General Info</legend>

        <table>
            <tr>
                <td class="label">Item Name</td>
                <td>
                    <input
                        type="text"
                        name="itemName"
                        value="Wireless Mouse">
                </td>
            </tr>

            <tr>
                <td>Description</td>
                <td>
                    <textarea name="itemDescription">Comfortable wireless mouse for office and gaming.</textarea>
                </td>
            </tr>

            <tr>
                <td>Category</td>
                <td>
                    <select name="category">
                        <option value="notSpecified" selected>notSpecified</option>
                        <option value="consumption">consumption</option>
                        <option value="household">household</option>
                        <option value="electronic">electronic</option>
                        <option value="gadget">gadget</option>
                    </select>
                </td>
            </tr>
        </table>

    </fieldset>

    <fieldset>
        <legend>Misc.</legend>

        <table>

            <tr>
                <td class="label">Inventory Amount</td>
                <td>
                    <input
                        type="number"
                        name="inventoryAmount"
                        value="50">
                </td>
            </tr>

            <tr>
                <td>List price</td>
                <td>
                    <input
                        type="number"
                        name="listPrice"
                        value="799">
                </td>
            </tr>

            <tr>
                <td>Available Stores</td>
                <td>

                    <label>
                        <input
                            type="checkbox"
                            name="availableStore[]"
                            value="Bangkok">
                        Bangkok
                    </label>

                    <label>
                        <input
                            type="checkbox"
                            name="availableStore[]"
                            value="Pattaya">
                        Pattaya
                    </label>

                    <label>
                        <input
                            type="checkbox"
                            name="availableStore[]"
                            value="Phuket">
                        Phuket
                    </label>

                </td>
            </tr>

            <tr>
                <td>Status</td>
                <td>

                    <label>
                        <input
                            type="radio"
                            name="status"
                            value="Active"
                            checked>
                        Active
                    </label>

                    <label>
                        <input
                            type="radio"
                            name="status"
                            value="Inactive">
                        Inactive
                    </label>

                </td>
            </tr>

        </table>

    </fieldset>

    <fieldset>
        <legend>Staff</legend>

        <table>

            <tr>
                <td class="label">Staff Email</td>
                <td>
                    <input
                        type="email"
                        name="staffEmail"
                        value="u6643008@au.edu">
                </td>
            </tr>

        </table>

    </fieldset>

    <div class="submit">
        <button type="submit">Submit Form</button>
    </div>

</form>

</body>
</html>
